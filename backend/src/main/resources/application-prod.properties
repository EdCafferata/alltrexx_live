# ── Alltrexx Live — PRODUCTIE instellingen ──────────────────────────────────
# Kopieer naar NAS en stel in als actief profiel: --spring.profiles.active=prod

# ── Database (MySQL op NAS) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/alltrexx?useSSL=false&serverTimezone=Europe/Amsterdam
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# ── CORS (productie: alleen het eigen domein, geen localhost) ────────────────
app.cors.allowed-origins=https://alltrexx.live,https://www.alltrexx.live

# ── Actuator: niets blootstellen behalve health ──────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── JWT (gebruik een sterk secret in productie!) ─────────────────────────────
app.jwt.secret=${JWT_SECRET}

# ── Admin-key voor /api/admin (boten beheren via X-Admin-Key header) ─────────
app.admin.api-key=${ADMIN_API_KEY:}

# ── Accounts die altijd PRO zijn (opake CloudKit-ID's, komma-gescheiden) ─────
# Vaste Pro-accounts ongeacht e-mail-detectie; overleeft een verse DB. Staat in .env.
app.pro.account-ids=${PRO_ACCOUNT_IDS:}

# ── AIS-data elke 15 minuten ophalen ─────────────────────────────────────────
app.scheduler.ais-interval-ms=900000
# AISHub-respons is ~2,6 MB (9000+ schepen in de bbox); default WebClient-buffer is
# 256 KB → decode faalt ("ophalen mislukt: 200 OK"). Ophogen zodat de poll slaagt.
spring.codec.max-in-memory-size=16MB

# ── AISHub (gratis voor data-aanleveraars) — ACTIEVE bron ────────────────────
app.aishub.username=${AISHUB_USERNAME:}
app.aishub.url=http://data.aishub.net/ws.php
# Gebied (bounding box) — standaard heel Nederland; route Lelystad→IJmuiden valt hierin
app.aishub.latmin=50.7
app.aishub.latmax=53.7
app.aishub.lonmin=3.2
app.aishub.lonmax=7.3

# ── Kpler Messages API (developers.kpler.com) — tweede bron naast AISHub ─────
app.kpler.token=${KPLER_TOKEN:}
app.kpler.url=https://rest.sml.kpler.com/messages

# ── ADS-B vliegtuigen via airplanes.live (gratis, geen key) — elke 15 min ────
# Sleutel = ICAO 24-bit hex (zoals MMSI bij schepen). Gebied = punt + straal (nm).
app.scheduler.adsb-interval-ms=900000
app.vliegtuig.url=https://api.airplanes.live/v2/point
app.vliegtuig.lat=52.3
app.vliegtuig.lon=5.3
app.vliegtuig.radius=250
app.kpler.lookback-hours=6

# ── MarineTraffic — uitgeschakeld (gratis account heeft geen export-API) ─────
app.marinetraffic.enabled=false
app.marinetraffic.api-key=${MARINETRAFFIC_API_KEY:DISABLED}
