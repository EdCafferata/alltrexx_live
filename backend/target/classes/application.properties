# ── Alltrexx Live — application.properties ──────────────────────────────────
# DEV: H2 in-memory database
# PROD: zie application-prod.properties

spring.application.name=alltrexx-live
server.port=8080

# ── Database (DEV: H2) ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:alltrexxdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=AllTrexxLiveSecretKey2024ChangeInProduction!
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,https://alltrexx.live

# ── Externe API's ─────────────────────────────────────────────────────────────
# MarineTraffic API key (stel in via .env of application-prod.properties)
app.marinetraffic.api-key=${MARINETRAFFIC_API_KEY:DEMO_KEY}
app.marinetraffic.base-url=https://services.marinetraffic.com/api

# AIS ophaalinterval in milliseconden (standaard: elk uur)
app.scheduler.ais-interval-ms=3600000

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.info.cafferata.alltrexx=INFO
