# ── Alltrexx Live — Docker Compose (Synology Container Manager) ──────────────
# GEEN build-stap: we draaien standaard-images en koppelen de vooraf gebouwde
# bestanden eraan. Dit omzeilt alle Synology-buildproblemen (geen DNS tijdens build,
# jar-rechten, image-cache). Container Manager hoeft alleen de images te PULLEN.
#
# Vooraf nodig op de NAS in deze projectmap:
#   backend/target/alltrexx-live-1.0.0.jar   (mvn clean package -DskipTests op de Mac)
#   frontend/build/                          (npm run build op de Mac)
#   frontend/nginx.conf, database/init.sql   (staan er al)
# En een .env met DB_ROOT_PASSWORD, DB_USERNAME, DB_PASSWORD, JWT_SECRET, MARINETRAFFIC_API_KEY.
#
# Importeer in Container Manager → Project → pad: /Backup-Ed/alltrexx-nas

name: alltrexx-live

services:

  # ── MySQL database (alleen intern) ──────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: alltrexx-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      alltrexx
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - alltrexx-db-fresh:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot backend: standaard Java-image + de jar eraan gekoppeld ───────
  backend:
    image: eclipse-temurin:21-jre
    container_name: alltrexx-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME:           ${DB_USERNAME}
      DB_PASSWORD:           ${DB_PASSWORD}
      JWT_SECRET:            ${JWT_SECRET}
      MARINETRAFFIC_API_KEY: ${MARINETRAFFIC_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/alltrexx?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Amsterdam
    volumes:
      - ./backend/target:/app:ro          # bevat alltrexx-live-1.0.0.jar
    command: ["java", "-jar", "/app/alltrexx-live-1.0.0.jar"]
    ports:
      - "8080:8080"

  # ── React frontend: standaard nginx + de build eraan gekoppeld ──────────────
  frontend:
    image: nginx:alpine
    container_name: alltrexx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  alltrexx-db-fresh:
