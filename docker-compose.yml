# ── Alltrexx Live — Docker Compose (Synology Container Manager) ──────────────
# KOGELVRIJE opzet: ÉÉN app-container die zowel de website als de API serveert.
# Geen aparte frontend-container, geen inter-container-proxy — dat hele netwerk-
# probleem verdwijnt. De DSM reverse proxy wijst naar localhost:8080.
#
# Spring Boot serveert de React-build (gekoppeld op /static) op "/" en de API op /api.
#
# Vooraf nodig in deze projectmap:
#   backend/target/alltrexx-live-1.0.0.jar   (mvn clean package -DskipTests)
#   frontend/build/  + database/init.sql
#   .env met DB_ROOT_PASSWORD, DB_USERNAME, DB_PASSWORD, JWT_SECRET, MARINETRAFFIC_API_KEY
#
# LET OP: zet de DSM reverse proxy voor alltrexx.live op doel localhost:8080 (was 3000).

name: alltrexx-live

networks:
  alltrexx-net:
    driver: bridge

services:

  # ── MySQL database (alleen intern) ──────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: alltrexx-db
    restart: unless-stopped
    networks: [alltrexx-net]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      alltrexx
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      # Named volume (bewezen werkend). Bind-mount ./db-data bleek op Synology een
      # permissie-val: de mysql-container (uid 999) mag de gedeelde map niet beschrijven
      # → init faalt ("verwijder de bestanden…" die je in File Station niet ziet).
      # Durabiliteit regelen we via off-NAS backup (issue #5), niet via bind-mount.
      - alltrexx-db-fresh:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── App: Spring Boot serveert ZOWEL de website als de API ───────────────────
  app:
    image: eclipse-temurin:21-jre
    container_name: alltrexx-app
    restart: unless-stopped
    networks: [alltrexx-net]
    depends_on:
      database:
        condition: service_healthy
    # Eigen DNS: de Synology-host-resolver kan externe namen (data.aishub.net) niet
    # doorgeven aan de container, waardoor de AIS-poller "DNS niet ophalen" gaf.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Vangnet: externe hosts hard in /etc/hosts zodat ze NOOIT DNS nodig hebben
    # (algemene container-DNS werkt niet op deze NAS). IP's geverifieerd 17 juni 2026;
    # hexdb.io + airplanes.live zitten achter Cloudflare (anycast, stabiel). Bijwerken
    # als een host ooit naar een ander IP wijst.
    extra_hosts:
      - "data.aishub.net:144.76.105.244"
      - "hexdb.io:104.21.0.112"
      - "api.airplanes.live:104.26.2.20"
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # JVM-tijdzone op NL → LocalDateTime.now() in posities = CEST i.p.v. UTC (was 2 uur terug).
      TZ: Europe/Amsterdam
      # AISHub-respons is ~2,6 MB (9000+ schepen); default WebClient-buffer = 256 KB →
      # decode faalde ("ophalen mislukt: 200 OK"). Buffer ophogen zodat de poll slaagt.
      SPRING_CODEC_MAX_IN_MEMORY_SIZE: 16MB
      DB_USERNAME:           ${DB_USERNAME}
      DB_PASSWORD:           ${DB_PASSWORD}
      JWT_SECRET:            ${JWT_SECRET}
      MARINETRAFFIC_API_KEY: ${MARINETRAFFIC_API_KEY}
      ADMIN_API_KEY:         ${ADMIN_API_KEY}
      AISHUB_USERNAME:       ${AISHUB_USERNAME}
      KPLER_TOKEN:           ${KPLER_TOKEN}
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/alltrexx?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Amsterdam
      # Spring serveert de React-build die hieronder op /static is gekoppeld:
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: file:/static/
    volumes:
      - ./backend/target:/app:ro          # de jar
      - ./frontend/build:/static:ro       # de website
    command: ["java", "-jar", "/app/alltrexx-live-1.0.0.jar"]
    ports:
      - "8080:8080"                       # DSM reverse proxy wijst hierheen

  # ── Dagelijkse DB-backup: mysqldump → ./db-backups op de NAS (laatste 14) ────
  # Draait als root (alleen file-write, geen chown) zodat de Synology bind-mount lukt.
  # Overleeft container/volume-wipes want de dumps staan op de NAS-filesystem.
  backup:
    image: mysql:8.0
    container_name: alltrexx-backup
    restart: unless-stopped
    user: "0:0"
    networks: [alltrexx-net]
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db-backups:/backups
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        while true; do
          TS=$$(date +%Y%m%d-%H%M%S)
          if mysqldump -h database -u"$$DB_USERNAME" -p"$$DB_PASSWORD" \
               --single-transaction --no-tablespaces alltrexx | gzip > /backups/alltrexx-$$TS.sql.gz; then
            echo "[backup] $$TS klaar"
          else
            echo "[backup] $$TS MISLUKT"; rm -f /backups/alltrexx-$$TS.sql.gz
          fi
          ls -1t /backups/alltrexx-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f
          sleep 86400
        done

volumes:
  alltrexx-db-fresh:
