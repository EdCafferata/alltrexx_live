# ── Alltrexx Live — Docker Compose (Synology Container Manager) ──────────────
# Schone productie-opzet. Waarden komen uit het .env-bestand in deze map.
# Importeer in Container Manager → Project → pad: /Backup-Ed/alltrexx-nas
#
# Vereist een .env met: DB_ROOT_PASSWORD, DB_USERNAME, DB_PASSWORD, JWT_SECRET,
# MARINETRAFFIC_API_KEY. (Geen defaults hier: ontbreekt er één, dan stopt de build
# meteen i.p.v. stilletjes een zwak wachtwoord te gebruiken.)

name: alltrexx-live

services:

  # ── MySQL database (alleen intern bereikbaar) ───────────────────────────────
  database:
    image: mysql:8.0
    container_name: alltrexx-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      alltrexx
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - alltrexx-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Geen host-poort: backend praat via het Docker-netwerk (database:3306).
    # Host-3306 botst met DSM's MariaDB. Extern debuggen? gebruik "13306:3306".
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: alltrexx-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME:           ${DB_USERNAME}
      DB_PASSWORD:           ${DB_PASSWORD}
      JWT_SECRET:            ${JWT_SECRET}
      MARINETRAFFIC_API_KEY: ${MARINETRAFFIC_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/alltrexx?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Amsterdam
    ports:
      - "8080:8080"      # optioneel/debug; mag later weg (frontend praat intern)
    volumes:
      - alltrexx-logs:/app/logs

  # ── React frontend via nginx (de reverse proxy wijst hierheen: localhost:3000) ─
  frontend:
    build:
      context: ./frontend
    container_name: alltrexx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"        # host 3000 -> nginx 80

volumes:
  alltrexx-db-data:
  alltrexx-logs:
