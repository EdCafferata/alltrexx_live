server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React router — stuur alles naar index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls naar de Spring Boot backend.
    # Docker's interne DNS (127.0.0.11) + variabele -> nginx zoekt het backend-IP
    # bij ELK verzoek opnieuw op. Zonder dit cachet nginx het IP bij startup, en na
    # een herstart van de backend (nieuw IP) blijven /api-verzoeken hangen.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_host backend;
        proxy_pass http://$backend_host:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Gzip compressie
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
